<div class="min-h-screen bg-gray-50">
    <nav class="bg-white shadow-sm border-b border-gray-200">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
          <div class="flex items-center">
            <span class="text-xl font-bold text-blue-600">PortfolioBuilder</span>
          </div>
          <div class="flex items-center gap-4">
             <div class="text-sm text-gray-600">{{ (auth.currentUser$ | async)?.email }}</div>
             <button (click)="logout()" class="text-sm text-red-600 hover:text-red-800 font-medium">Sign Out</button>
          </div>
        </div>
      </div>
    </nav>
  
    <main class="max-w-7xl mx-auto py-10 px-4 sm:px-6 lg:px-8">
      
      <div class="flex justify-between items-center mb-8">
        <h1 class="text-2xl font-bold text-gray-900">My Portfolios</h1>
        <button 
          routerLink="/create"
          class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg shadow-sm transition-colors flex items-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
          Create New
        </button>
      </div>
  
      <div *ngIf="isLoading" class="flex justify-center py-12">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
      </div>
  
      <div *ngIf="!isLoading && portfolios.length === 0" class="text-center py-12 bg-white rounded-xl border border-dashed border-gray-300">
        <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
        </svg>
        <h3 class="mt-2 text-sm font-medium text-gray-900">No portfolios</h3>
        <p class="mt-1 text-sm text-gray-500">Get started by creating a new portfolio.</p>
      </div>
  
      <div class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
        <div *ngFor="let p of portfolios" class="bg-white overflow-hidden shadow rounded-lg hover:shadow-md transition-shadow border border-gray-200">
          <div class="p-5">
            <div class="flex items-center justify-between mb-4">
               <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800">
                 {{ p.slug }}
               </span>
               <span [class]="p.is_published ? 'text-green-500' : 'text-amber-500'" class="text-xs font-bold">
                 {{ p.is_published ? 'Published' : 'Draft' }}
               </span>
            </div>
            <h3 class="text-lg leading-6 font-medium text-gray-900">
              Portfolio #{{ p.id }}
            </h3>
            <p class="mt-1 text-sm text-gray-500 truncate">
              Template ID: {{ p.template_id }}
            </p>
          </div>
          <div class="bg-gray-50 px-5 py-3 border-t border-gray-200 flex justify-between">
            <a [routerLink]="['/editor', p.id]" class="text-sm font-medium text-blue-600 hover:text-blue-500">Edit content</a>
            <a href="#" class="text-sm font-medium text-gray-500 hover:text-gray-700">View live</a>
          </div>
        </div>
      </div>
  
    </main>
  </div>
