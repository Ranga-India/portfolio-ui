<div class="h-screen flex flex-col bg-gray-100 overflow-hidden" *ngIf="!isLoading">
  
    <nav class="bg-white border-b px-4 h-14 flex items-center justify-between shrink-0 z-10">
      <div class="flex items-center gap-3">
        <a routerLink="/dashboard" class="text-gray-500 hover:text-gray-800">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        </a>
        <span class="font-bold text-gray-800">{{ portfolio.slug }}</span>
        <span class="text-xs px-2 py-0.5 rounded bg-gray-100 text-gray-500">{{ isSaving ? 'Saving...' : 'Saved' }}</span>
      </div>
      
      <div class="md:hidden flex bg-gray-100 rounded p-1">
        <button (click)="activeTab='editor'" [class.bg-white]="activeTab==='editor'" class="px-3 py-1 text-sm rounded transition shadow-sm">Edit</button>
        <button (click)="activeTab='preview'" [class.bg-white]="activeTab==='preview'" class="px-3 py-1 text-sm rounded transition shadow-sm">Preview</button>
      </div>
  
      <div class="flex items-center gap-3">
        <button 
            *ngIf="portfolio.is_published"
            (click)="viewLive()"
            class="text-gray-600 hover:text-blue-600 text-sm font-medium flex items-center gap-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
            View Live
        </button>
    
        <button 
            (click)="togglePublish()"
            [class.bg-green-600]="!portfolio.is_published"
            [class.hover:bg-green-700]="!portfolio.is_published"
            [class.bg-red-500]="portfolio.is_published"
            [class.hover:bg-red-600]="portfolio.is_published"
            class="text-white px-4 py-1.5 rounded text-sm font-medium transition-colors">
            {{ portfolio.is_published ? 'Unpublish' : 'Publish Now' }}
        </button>
    </div>    </nav>
  
    <div class="flex-1 flex overflow-hidden">
      
      <div class="w-full md:w-1/3 lg:w-1/4 bg-white border-r overflow-y-auto" [class.hidden]="activeTab==='preview'">
        <div class="p-6">
          <h2 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4">Content Editor</h2>
          
          <form [formGroup]="form">
             <ng-container *ngTemplateOutlet="recursiveList; context:{ $implicit: form }"></ng-container>
          </form>
        </div>
      </div>
  
      <div class="flex-1 bg-gray-100 flex items-center justify-center p-4 md:p-8" >
        
        <div class="w-full h-full max-w-5xl bg-white rounded-lg shadow-2xl overflow-hidden flex flex-col border border-gray-300">
          <div class="bg-gray-50 border-b px-4 py-2 flex items-center gap-2">
             <div class="flex gap-1.5">
               <div class="w-2.5 h-2.5 rounded-full bg-red-400"></div>
               <div class="w-2.5 h-2.5 rounded-full bg-yellow-400"></div>
               <div class="w-2.5 h-2.5 rounded-full bg-green-400"></div>
             </div>
             <div class="flex-1 bg-white border rounded text-xs text-gray-500 text-center py-1 mx-4">
               your-portfolio.com/{{ portfolio.slug }}
             </div>
          </div>
  
          <div class="flex-1 overflow-y-auto relative">
             <app-dev-minimalist [data]="form.value"></app-dev-minimalist>
          </div>
        </div>
  
      </div>
  
    </div>
  </div>
  
  <div *ngIf="isLoading" class="h-screen flex items-center justify-center">
    Loading Editor...
  </div>
  
  <ng-template #recursiveList let-controlGroup>
    
    <div class="space-y-4">
      <div *ngFor="let key of getKeys(controlGroup)">
        
        <div *ngIf="isControl(controlGroup.get(key))" class="mb-4">
           <label class="block text-xs font-bold text-gray-500 mb-1 capitalize">{{ key.replace('_', ' ') }}</label>
           <input 
              [formControl]="$any(controlGroup.get(key))" 
              class="w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 text-sm p-2 border" 
              type="text">
        </div>
  
        <div *ngIf="isGroup(controlGroup.get(key))" class="border-l-2 border-blue-100 pl-3 mb-4">
          <h3 class="text-sm font-bold text-gray-800 mb-2 capitalize">{{ key }}</h3>
          <ng-container *ngTemplateOutlet="recursiveList; context:{ $implicit: getAsGroup(controlGroup.get(key)) }"></ng-container>
        </div>
  
        <div *ngIf="isArray(controlGroup.get(key))" class="mb-6">
          <h3 class="text-sm font-bold text-gray-800 mb-2 capitalize">{{ key }}</h3>
          
          <div *ngFor="let item of getAsArray(controlGroup.get(key)).controls; let i = index" class="bg-gray-50 p-3 rounded mb-2 border">
             <div class="text-xs text-right text-gray-400 mb-1">Item {{i+1}}</div>
             <ng-container *ngIf="isGroup(item)">
               <ng-container *ngTemplateOutlet="recursiveList; context:{ $implicit: getAsGroup(item) }"></ng-container>
             </ng-container>
             <ng-container *ngIf="isControl(item)">
               <input [formControl]="$any(item)" class="w-full border p-1 text-sm rounded">
             </ng-container>
          </div>
          </div>
  
      </div>
    </div>
  </ng-template>
