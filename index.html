<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Robing Room - Signup Prototype</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 40px 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 30px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #444;
        }
        input[type="text"], input[type="email"], input[type="password"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .required-asterisk {
            color: #e74c3c;
        }
        .radio-group {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }
        .radio-group label {
            font-weight: normal;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .dynamic-section {
            display: none; /* Hidden by default */
            padding: 20px;
            background-color: #f8f9fa;
            border-left: 4px solid #3498db;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        .submit-btn:hover {
            background-color: #1a252f;
        }
        hr {
            border: 0;
            border-top: 1px solid #eee;
            margin: 30px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Create Your Account</h2>
    
    <form id="signupForm">
        <div class="form-group">
            <label>First Name <span class="required-asterisk">*</span></label>
            <input type="text" placeholder="Enter first name">
        </div>
        <div class="form-group">
            <label>Last Name <span class="required-asterisk">*</span></label>
            <input type="text" placeholder="Enter last name">
        </div>
        <div class="form-group">
            <label>Email <span class="required-asterisk">*</span></label>
            <input type="email" placeholder="Enter email address">
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" placeholder="Enter phone number">
        </div>
        <div class="form-group">
            <label>Website URL</label>
            <input type="text" placeholder="https://">
        </div>

        <hr>

        <div class="form-group">
            <label>Are you a Lawyer? <span class="required-asterisk">*</span></label>
            <div class="radio-group">
                <label>
                    <input type="radio" name="userType" value="lawyer" onclick="toggleSections()"> Yes, I am a Lawyer
                </label>
                <label>
                    <input type="radio" name="userType" value="nonLawyer" onclick="toggleSections()"> No, I am a Non-Lawyer Professional
                </label>
            </div>
        </div>

        <div id="lawyerSection" class="dynamic-section">
            <div class="form-group">
                <label>State of Admission</label>
                <input type="text" placeholder="e.g. New York">
            </div>
            <div class="form-group">
                <label>Year of Admission</label>
                <input type="text" placeholder="YYYY">
            </div>
            <div class="form-group">
                <label>Bar ID <span class="required-asterisk">*</span></label>
                <input type="text" placeholder="Enter your Bar ID">
            </div>
            
            <div class="form-group">
                <label>Professional Affiliation</label>
                <select id="affiliationDropdown" onchange="toggleAffiliation()">
                    <option value="">-- Select --</option>
                    <option value="practicing">Practicing Attorney</option>
                    <option value="professor">Law Professor</option>
                </select>
            </div>

            <div id="practicingSection" style="display: none; margin-top: 15px;">
                <div class="form-group">
                    <label>Firm Name</label>
                    <input type="text" placeholder="Enter firm name">
                </div>
                <div class="form-group">
                    <label>Firm Size</label>
                    <select>
                        <option value="">-- Select Size --</option>
                        <option value="1">Solo (1)</option>
                        <option value="2-10">Small (2-10)</option>
                        <option value="11-50">Medium (11-50)</option>
                        <option value="51-200">Large (51-200)</option>
                        <option value="200+">Enterprise (200+)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Area of Expertise</label>
                    <select>
                        <option value="">-- Select Area --</option>
                        <option value="civil">Civil Litigation</option>
                        <option value="criminal">Criminal Defense</option>
                        <option value="corporate">Corporate Law</option>
                        <option value="family">Family Law</option>
                    </select>
                </div>
            </div>

            <div id="professorSection" style="display: none; margin-top: 15px;">
                <div class="form-group">
                    <label>University Affiliation</label>
                    <input type="text" placeholder="Enter university name">
                </div>
            </div>
        </div>

        <div id="nonLawyerSection" class="dynamic-section">
            <div class="form-group">
                <label>Occupation</label>
                <select>
                    <option value="">-- Select Occupation --</option>
                    <option value="student">Student</option>
                    <option value="academic">Academic</option>
                    <option value="paralegal">Paralegal</option>
                    <option value="assistant">Legal Assistant</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Place of Business</label>
                <input type="text" placeholder="Enter place of business">
            </div>
        </div>

        <hr>

        <div class="form-group">
            <label>Create Password <span class="required-asterisk">*</span></label>
            <input type="password" placeholder="Min 8 characters">
        </div>
        <div class="form-group">
            <label>Confirm Password <span class="required-asterisk">*</span></label>
            <input type="password" placeholder="Retype password">
        </div>
        
        <div class="form-group">
            <label style="font-weight: normal; display: flex; align-items: center; gap: 8px;">
                <input type="checkbox"> I agree to the terms of use
            </label>
        </div>

        <button type="button" class="submit-btn" onclick="alert('Form submitted! (Prototype)')">Submit Registration</button>
    </form>
</div>

<script>
    function toggleSections() {
        const userType = document.querySelector('input[name="userType"]:checked').value;
        const lawyerSection = document.getElementById('lawyerSection');
        const nonLawyerSection = document.getElementById('nonLawyerSection');

        if (userType === 'lawyer') {
            lawyerSection.style.display = 'block';
            nonLawyerSection.style.display = 'none';
        } else if (userType === 'nonLawyer') {
            lawyerSection.style.display = 'none';
            nonLawyerSection.style.display = 'block';
        }
    }

    function toggleAffiliation() {
        const affiliation = document.getElementById('affiliationDropdown').value;
        const practicingSection = document.getElementById('practicingSection');
        const professorSection = document.getElementById('professorSection');

        if (affiliation === 'practicing') {
            practicingSection.style.display = 'block';
            professorSection.style.display = 'none';
        } else if (affiliation === 'professor') {
            practicingSection.style.display = 'none';
            professorSection.style.display = 'block';
        } else {
            practicingSection.style.display = 'none';
            professorSection.style.display = 'none';
        }
    }
</script>

</body>
</html>
