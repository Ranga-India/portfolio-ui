<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Robing Room - Signup Prototype</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 40px 20px;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            background: #fff;
            padding: 30px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #444;
        }
        input[type="text"], input[type="email"], input[type="password"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .required-asterisk {
            color: #e74c3c;
        }
        .radio-group {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }
        .radio-group label {
            font-weight: normal;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .dynamic-section {
            display: none;
            padding: 20px;
            background-color: #f8f9fa;
            border-left: 4px solid #3498db;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .other-input {
            display: none;
            margin-top: 10px;
        }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        .submit-btn:hover {
            background-color: #1a252f;
        }
        hr {
            border: 0;
            border-top: 1px solid #eee;
            margin: 30px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Create Your Account</h2>
    
    <form id="signupForm">
        <div class="form-group">
            <label>First Name <span class="required-asterisk">*</span></label>
            <input type="text" placeholder="Enter first name" required>
        </div>
        <div class="form-group">
            <label>Last Name <span class="required-asterisk">*</span></label>
            <input type="text" placeholder="Enter last name" required>
        </div>
        <div class="form-group">
            <label>Email <span class="required-asterisk">*</span></label>
            <input type="email" placeholder="Enter email address" required>
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" placeholder="Enter phone number">
        </div>

        <hr>

        <div class="form-group">
            <label>User Type <span class="required-asterisk">*</span></label>
            <div class="radio-group">
                <label>
                    <input type="radio" name="userType" value="lawyer" onclick="toggleSections()"> Lawyer
                </label>
                <label>
                    <input type="radio" name="userType" value="nonLawyer" onclick="toggleSections()"> Non-Lawyer Professional
                </label>
            </div>
        </div>

        <div id="lawyerSection" class="dynamic-section">
            <div class="form-group">
                <label>Professional Affiliation / Area of Expertise</label>
                <select id="lawyerAffiliation" onchange="checkOther('lawyerAffiliation', 'lawyerOther')">
                    <option value="">-- Select Specialty --</option>
                    <option value="appellate">Appellate (Appeals, briefing, higher courts)</option>
                    <option value="bankruptcy">Bankruptcy & Restructuring</option>
                    <option value="business">Business & Corporate (Transactions, M&A, contracts)</option>
                    <option value="civil">Civil Litigation (General, commercial, personal injury)</option>
                    <option value="criminal">Criminal Law (Defense and prosecution)</option>
                    <option value="employment">Employment & Labor</option>
                    <option value="family">Family Law (Divorce, custody, support)</option>
                    <option value="government">Government & Regulatory</option>
                    <option value="immigration">Immigration</option>
                    <option value="ip">Intellectual Property</option>
                    <option value="realestate">Real Estate</option>
                    <option value="trusts">Trusts & Estates</option>
                    <option value="other">Other...</option>
                </select>
                <div id="lawyerOther" class="other-input">
                    <input type="text" placeholder="Please specify your specialty">
                </div>
            </div>
            <div class="form-group">
                <label>Bar ID <span class="required-asterisk">*</span></label>
                <input type="text" placeholder="Enter your Bar ID">
            </div>
            <div class="form-group">
                <label>State of Admission</label>
                <input type="text" placeholder="e.g. New York">
            </div>
        </div>

        <div id="nonLawyerSection" class="dynamic-section">
            <div class="form-group">
                <label>General Designation</label>
                <select id="nonLawyerAffiliation" onchange="checkOther('nonLawyerAffiliation', 'nonLawyerOther')">
                    <option value="">-- Select Designation --</option>
                    <option value="public">Public / Users of the System (litigants, jurors, students)</option>
                    <option value="support">Legal Support Roles (paralegals, court staff)</option>
                    <option value="enforcement">Government & Enforcement (law enforcement, regulators)</option>
                    <option value="business">Business & Industry (HR, execs, real estate, insurance, tech)</option>
                    <option value="experts">Experts & Analysts (forensics, academics, journalists)</option>
                    <option value="other">Other...</option>
                </select>
                <div id="nonLawyerOther" class="other-input">
                    <input type="text" placeholder="Please specify your role">
                </div>
            </div>
            <div class="form-group">
                <label>Place of Business / Organization</label>
                <input type="text" placeholder="Enter place of business">
            </div>
        </div>

        <hr>

        <div class="form-group">
            <label>Create Password <span class="required-asterisk">*</span></label>
            <input type="password" placeholder="Min 8 characters">
        </div>
        <div class="form-group">
            <label>Confirm Password <span class="required-asterisk">*</span></label>
            <input type="password" placeholder="Retype password">
        </div>
        
        <div class="form-group">
            <label style="font-weight: normal; display: flex; align-items: center; gap: 8px;">
                <input type="checkbox"> I agree to the terms of use
            </label>
        </div>

        <button type="button" class="submit-btn" onclick="alert('Registration complete! Data captured for ' + document.querySelector('input[name=\'userType\']:checked').value)">Submit Registration</button>
    </form>
</div>

<script>
    function toggleSections() {
        const userType = document.querySelector('input[name="userType"]:checked').value;
        const lawyerSection = document.getElementById('lawyerSection');
        const nonLawyerSection = document.getElementById('nonLawyerSection');

        if (userType === 'lawyer') {
            lawyerSection.style.display = 'block';
            nonLawyerSection.style.display = 'none';
        } else {
            lawyerSection.style.display = 'none';
            nonLawyerSection.style.display = 'block';
        }
    }

    function checkOther(dropdownId, otherId) {
        const dropdown = document.getElementById(dropdownId);
        const otherDiv = document.getElementById(otherId);
        
        if (dropdown.value === 'other') {
            otherDiv.style.display = 'block';
        } else {
            otherDiv.style.display = 'none';
        }
    }
</script>

</body>
</html>
